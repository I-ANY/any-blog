<script>
  (() => {
    const toc = document.querySelector('.post-single > .toc');
    if (!toc) return;

    const title = toc.querySelector('summary .title');
    if (title) title.textContent = '目录';

    const links = Array.from(toc.querySelectorAll('a[href^="#"]'));
    const headings = links
      .map((link) => {
        const id = decodeURIComponent(link.getAttribute('href').slice(1));
        return { link, heading: document.getElementById(id) };
      })
      .filter((item) => item.heading);

    const activate = (link) => {
      links.forEach((item) => item.classList.remove('active'));
      link.classList.add('active');
    };

    if (headings.length > 0) activate(headings[0].link);

    const observer = new IntersectionObserver((entries) => {
      const visible = entries
        .filter((entry) => entry.isIntersecting)
        .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];
      if (!visible) return;

      const current = headings.find((item) => item.heading === visible.target);
      if (current) activate(current.link);
    }, { rootMargin: '-20% 0px -65% 0px', threshold: [0, 1] });

    headings.forEach((item) => observer.observe(item.heading));
    links.forEach((link) => link.addEventListener('click', () => activate(link)));
  })();
</script>


<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var toplink = document.getElementById("top-link");
    window.onscroll = function () {
        const scrollThreshold = window.innerHeight;
        if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
            toplink.classList.remove("hidden");
        } else {
            toplink.classList.add("hidden");
        }
    };

</script>

    document.getElementById("theme-toggle").addEventListener("click", () => {
        const html = document.querySelector("html");
        if (html.dataset.theme === "dark") {
            html.dataset.theme = 'light';
            localStorage.setItem("pref-theme", 'light');
        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
    })
