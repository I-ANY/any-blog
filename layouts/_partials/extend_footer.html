{{- if (.Param "ShowToc") }}
<script>
  (() => {
    const toc = document.querySelector('.post-single > .toc');
    if (!toc) return;

    const title = toc.querySelector('summary .title');
    if (title) title.textContent = '目录';

    const links = Array.from(toc.querySelectorAll('a[href^="#"]'));
    const headings = links
      .map((link) => {
        const id = decodeURIComponent(link.getAttribute('href').slice(1));
        return { link, heading: document.getElementById(id) };
      })
      .filter((item) => item.heading);

    const activate = (link) => {
      links.forEach((item) => item.classList.remove('active'));
      link.classList.add('active');
    };

    if (headings.length > 0) activate(headings[0].link);

    const observer = new IntersectionObserver((entries) => {
      const visible = entries
        .filter((entry) => entry.isIntersecting)
        .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];
      if (!visible) return;

      const current = headings.find((item) => item.heading === visible.target);
      if (current) activate(current.link);
    }, { rootMargin: '-20% 0px -65% 0px', threshold: [0, 1] });

    headings.forEach((item) => observer.observe(item.heading));
    links.forEach((link) => link.addEventListener('click', () => activate(link)));
  })();
</script>
{{- end }}
